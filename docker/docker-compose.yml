services:
  booking-api:
    container_name: booking-api
    image: reservepoint.api
    build:
      context: ..
      dockerfile: ReservePoint.API/Dockerfile
    ports:
      - '8085:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_PATHBASE=/api/booking
      - Authentication__TokenValidationParameters__ValidIssuers__2=${KEYCLOAK_ISSUER}
      - ConnectionStrings__DefaultConnection=Host=booking-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - Authentication__TokenValidationParameters__ValidIssuers__0=${KEYCLOAK_ISSUER}
      - Services__ResourcesServiceUrl=${RESOURCES_SERVICE_URL}
      - Services__OrgServiceUrl=${ORG_SERVICE_URL}
      - Services__UserServiceUrl=${USER_SERVICE_URL}
      - UseFakeUser=${USE_FAKE_USER:-true}
      - UseFakeOrg=${USE_FAKE_ORG:-true}
      - UseFakeRes=${USE_FAKE_RES:-true}
    depends_on:
      booking-db:
        condition: service_healthy
    networks:
      - booking-network

  booking-db:
    container_name: booking-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql
    ports:
      - '5435:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}' ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - booking-network

volumes:
  pg-data:

networks:
  booking-network:
    external: true